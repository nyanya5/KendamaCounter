<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>もしかめカウンター🐾</title>
    <style>
        :root { --brown: #5D4037; --pink: #F06292; --bg: #FFFBF0; --green: #A5D6A7; --red: #FF8A80; }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--brown); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; user-select: none; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 90%; max-width: 400px; text-align: center; }
        #timer { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; }
        #count { font-size: 8rem; font-weight: 900; margin: 0; line-height: 1; }
        #bpm { font-size: 1.5rem; font-weight: bold; color: var(--pink); height: 2rem; margin-bottom: 10px; }
        #paw { font-size: 4rem; transition: transform 0.1s; }
        .controls { width: 100%; margin-top: 20px; }
        button { width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; margin-bottom: 10px; color: white; }
        #startBtn { background-color: var(--green); color: var(--brown); }
        #startBtn.stop { background-color: var(--red); }
        #saveBtn { background-color: var(--brown); }
        button:disabled { background-color: #ccc !important; }
        .sliders { width: 100%; background: white; padding: 15px; border-radius: 15px; box-sizing: border-box; }
        .slider-group { margin-bottom: 10px; text-align: left; }
        input[type="range"] { width: 100%; accent-color: var(--pink); }
        #historyScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; flex-direction: column; padding: 20px; box-sizing: border-box; z-index: 100; }
        .history-list { flex: 1; overflow-y: auto; margin: 20px 0; }
        .history-item { background: white; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="timer">00:00</div>
    <div id="bpm"></div>
    <div id="count">0</div>
    <div id="paw">🐾</div>
    <div class="controls">
        <button id="startBtn">計測スタート</button>
        <button id="saveBtn" disabled>結果を保存してリセット</button>
        <div class="sliders">
            <div class="slider-group">
                <label>感度: <span id="sensVal">150</span></label>
                <input type="range" id="sensSlider" min="10" max="500" value="150">
            </div>
            <div class="slider-group">
                <label>誤検出防止: <span id="coolVal">300</span>ms</label>
                <input type="range" id="coolSlider" min="50" max="1000" value="300">
            </div>
        </div>
        <button id="historyBtn" style="background:transparent; color:var(--brown); text-decoration:underline;">過去の履歴 ＞</button>
    </div>
</div>

<div id="historyScreen">
    <h2>練習の記録 🐾</h2>
    <div class="history-list" id="historyList"></div>
    <button id="backBtn" style="background:var(--brown);">戻る</button>
</div>

<script>
    let audioContext, analyser, dataArray, timerInterval;
    let isMeasuring = false, startTime = 0, detectionTimes = [];
    
    const countEl = document.getElementById('count'), timerEl = document.getElementById('timer'), bpmEl = document.getElementById('bpm');
    const startBtn = document.getElementById('startBtn'), saveBtn = document.getElementById('saveBtn'), paw = document.getElementById('paw');

    // 音声を初期化する関数
    async function setupAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioContext.state === 'suspended') {
            await audioContext.resume();
        }
        // マイクの初期化（未完了の場合のみ）
        if (!analyser) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }
    }

    // ビープ音再生
    function playBeep(freq, duration) {
        if (!audioContext) return;
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioContext.currentTime);
        gain.gain.setValueAtTime(0.1, audioContext.currentTime);
        osc.connect(gain);
        gain.connect(audioContext.destination);
        osc.start();
        osc.stop(audioContext.currentTime + duration);
    }

    startBtn.onclick = async () => {
        try {
            await setupAudio(); // ボタンを押した瞬間にオーディオを有効化
            
            if (!isMeasuring) {
                startBtn.disabled = true;
                let cd = 3;
                bpmEl.innerText = "";
                countEl.innerText = cd;
                playBeep(440, 0.1); // 最初の「ピッ」

                const cdInt = setInterval(() => {
                    cd--;
                    if (cd > 0) {
                        countEl.innerText = cd;
                        playBeep(440, 0.1); // ピッ
                    } else {
                        clearInterval(cdInt);
                        playBeep(880, 0.3); // ピー！
                        startMeasuring();
                    }
                }, 1000);
            } else {
                stopMeasuring();
            }
        } catch (e) {
            alert("エラー: " + e);
        }
    };

    function startMeasuring() {
        isMeasuring = true; detectionTimes = []; startTime = Date.now();
        countEl.innerText = "0"; startBtn.innerText = "ミス！(計測終了)";
        startBtn.classList.add('stop'); startBtn.disabled = false; saveBtn.disabled = true;
        timerInterval = setInterval(() => { timerEl.innerText = formatTime(Date.now() - startTime); }, 100);
        detectSound();
    }

    function detectSound() {
        if (!isMeasuring) return;
        analyser.getByteTimeDomainData(dataArray);
        let max = 0;
        for (let i = 0; i < dataArray.length; i++) {
            let v = Math.abs(dataArray[i] - 128);
            if (v > max) max = v;
        }
        const now = Date.now();
        if (max > (document.getElementById('sensSlider').value / 10) && (now - (window.lastT || 0)) > document.getElementById('coolSlider').value) {
            detectionTimes.push(now); countEl.innerText = detectionTimes.length; window.lastT = now;
            paw.style.transform = "scale(1.4)"; setTimeout(() => paw.style.transform = "scale(1)", 100);
        }
        requestAnimationFrame(detectSound);
    }

    function stopMeasuring() {
        isMeasuring = false; clearInterval(timerInterval);
        startBtn.innerText = "計測スタート"; startBtn.classList.remove('stop'); saveBtn.disabled = false;
        if (detectionTimes.length >= 2) {
            const count = detectionTimes.length - 1;
            const time = detectionTimes[detectionTimes.length - 2] - startTime;
            countEl.innerText = count; timerEl.innerText = formatTime(time);
            bpmEl.innerText = (count / (time / 60000)).toFixed(1) + " 回/分 (BPM)";
            window.lastResult = { count, time, bpm: count / (time / 60000) };
        }
    }

    saveBtn.onclick = () => {
        const res = window.lastResult;
        const log = `${new Date().toLocaleString()} | ${formatTime(res.time)} | ${res.count}回 (${res.bpm.toFixed(1)}/分)`;
        let h = JSON.parse(localStorage.getItem('k_history') || "[]");
        h.unshift(log); localStorage.setItem('k_history', JSON.stringify(h));
        countEl.innerText = "0"; timerEl.innerText = "00:00"; bpmEl.innerText = ""; saveBtn.disabled = true;
    };

    function formatTime(ms) {
        const s = Math.floor(ms / 1000);
        return String(Math.floor(s / 60)).padStart(2, '0') + ":" + String(s % 60).padStart(2, '0');
    }

    document.getElementById('historyBtn').onclick = () => {
        document.getElementById('historyList').innerHTML = JSON.parse(localStorage.getItem('k_history') || "[]").map(i => `<div class="history-item">${i}</div>`).join('');
        document.getElementById('historyScreen').style.display = 'flex';
    };
    document.getElementById('backBtn').onclick = () => document.getElementById('historyScreen').style.display = 'none';
    document.getElementById('sensSlider').oninput = (e) => document.getElementById('sensVal').innerText = e.target.value;
    document.getElementById('coolSlider').oninput = (e) => document.getElementById('coolVal').innerText = e.target.value;
</script>
</body>
</html>
