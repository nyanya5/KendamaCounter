<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>もしかめカウンター🐾</title>
    <style>
        :root { --brown: #5D4037; --pink: #F06292; --bg: #FFFBF0; --green: #A5D6A7; --red: #FF8A80; }
        body { font-family: sans-serif; background: var(--bg); color: var(--brown); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; user-select: none; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 90%; max-width: 400px; text-align: center; }
        #timer { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; }
        #count { font-size: 8rem; font-weight: 900; margin: 0; line-height: 1; }
        #bpm { font-size: 1.5rem; font-weight: bold; color: var(--pink); height: 2rem; margin-bottom: 10px; }
        #paw { font-size: 4rem; transition: transform 0.1s; }
        .controls { width: 100%; margin-top: 20px; }
        button { width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; margin-bottom: 10px; color: white; }
        #startBtn { background-color: var(--green); color: var(--brown); }
        #startBtn.stop { background-color: var(--red); }
        #saveBtn { background-color: var(--brown); }
        button:disabled { background-color: #ccc !important; }
        .sliders { width: 100%; background: white; padding: 15px; border-radius: 15px; box-sizing: border-box; }
        .slider-group { margin-bottom: 10px; text-align: left; }
        input[type="range"] { width: 100%; accent-color: var(--pink); }
        #historyScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; flex-direction: column; padding: 20px; box-sizing: border-box; z-index: 100; }
        .history-list { flex: 1; overflow-y: auto; margin: 20px 0; }
        .history-item { background: white; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 0.8rem; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div id="timer">00:00</div>
    <div id="bpm"></div>
    <div id="count">0</div>
    <div id="paw">🐾</div>
    <div class="controls">
        <button id="startBtn">計測スタート</button>
        <button id="saveBtn" disabled>結果を保存してリセット</button>
        <div class="sliders">
            <div class="slider-group">
                <label>感度: <span id="sensVal">150</span></label>
                <input type="range" id="sensSlider" min="10" max="500" value="150">
            </div>
            <div class="slider-group">
                <label>誤検出防止: <span id="coolVal">300</span>ms</label>
                <input type="range" id="coolSlider" min="50" max="1000" value="300">
            </div>
        </div>
        <button id="historyBtn" style="background:transparent; color:var(--brown); text-decoration:underline;">履歴表示 ＞</button>
    </div>
</div>

<div id="historyScreen">
    <h2>練習の記録 🐾</h2>
    <div class="history-list" id="historyList"></div>
    <button id="backBtn" style="background:var(--brown);">戻る</button>
</div>

<script>
    let audioCtx, analyser, dataArray, timerInterval;
    let isMeasuring = false, startTime = 0, detectionTimes = [];

    // 音声ファイルの用意（短いピッという音と、ピーという音の代わり）
    const beepLow = new Audio('https://actions.google.com/sounds/v1/foley/clock_ticking.ogg');
    const beepHigh = new Audio('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg');

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
        }
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        // iPhone対策：音源を一度「無音」で再生してロック解除
        beepLow.play().then(() => { beepLow.pause(); beepLow.currentTime = 0; });
    }

    document.getElementById('startBtn').onclick = async () => {
        await initAudio();
        if (!isMeasuring) {
            document.getElementById('startBtn').disabled = true;
            let cd = 3;
            document.getElementById('count').innerText = cd;
            beepLow.play(); // 3

            const cdInt = setInterval(() => {
                cd--;
                if (cd > 0) {
                    document.getElementById('count').innerText = cd;
                    beepLow.play(); // 2, 1
                } else {
                    clearInterval(cdInt);
                    beepHigh.play(); // START!
                    startMeasuring();
                }
            }, 1000);
        } else {
            stopMeasuring();
        }
    };

    function startMeasuring() {
        isMeasuring = true; detectionTimes = []; startTime = Date.now();
        document.getElementById('count').innerText = "0";
        document.getElementById('startBtn').innerText = "ミス！(終了)";
        document.getElementById('startBtn').classList.add('stop');
        document.getElementById('startBtn').disabled = false;
        timerInterval = setInterval(() => {
            document.getElementById('timer').innerText = formatTime(Date.now() - startTime);
        }, 100);
        detect();
    }

    function detect() {
        if (!isMeasuring) return;
        analyser.getByteTimeDomainData(dataArray);
        let max = 0;
        for (let i = 0; i < dataArray.length; i++) {
            let v = Math.abs(dataArray[i] - 128);
            if (v > max) max = v;
        }
        const now = Date.now();
        if (max > (document.getElementById('sensSlider').value / 10) && (now - (window.lt || 0)) > document.getElementById('coolSlider').value) {
            detectionTimes.push(now);
            document.getElementById('count').innerText = detectionTimes.length;
            window.lt = now;
            document.getElementById('paw').style.transform = "scale(1.4)";
            setTimeout(() => document.getElementById('paw').style.transform = "scale(1)", 100);
        }
        requestAnimationFrame(detect);
    }

    function stopMeasuring() {
        isMeasuring = false; clearInterval(timerInterval);
        document.getElementById('startBtn').innerText = "計測スタート";
        document.getElementById('startBtn').classList.remove('stop');
        document.getElementById('saveBtn').disabled = false;
        if (detectionTimes.length >= 2) {
            const c = detectionTimes.length - 1;
            const t = detectionTimes[detectionTimes.length - 2] - startTime;
            document.getElementById('count').innerText = c;
            document.getElementById('timer').innerText = formatTime(t);
            document.getElementById('bpm').innerText = (c / (t / 60000)).toFixed(1) + " BPM";
            window.lastR = { c, t, b: (c / (t / 60000)) };
        }
    }

    document.getElementById('saveBtn').onclick = () => {
        const r = window.lastR;
        const log = `${new Date().toLocaleString()} | ${formatTime(r.t)} | ${r.c}回 (${r.b.toFixed(1)}/分)`;
        let h = JSON.parse(localStorage.getItem('k_h') || "[]");
        h.unshift(log); localStorage.setItem('k_h', JSON.stringify(h));
        document.getElementById('count').innerText = "0";
        document.getElementById('timer').innerText = "00:00";
        document.getElementById('bpm').innerText = "";
        document.getElementById('saveBtn').disabled = true;
    };

    function formatTime(ms) {
        const s = Math.floor(ms / 1000);
        return String(Math.floor(s / 60)).padStart(2, '0') + ":" + String(s % 60).padStart(2, '0');
    }

    document.getElementById('historyBtn').onclick = () => {
        document.getElementById('historyList').innerHTML = JSON.parse(localStorage.getItem('k_h') || "[]").map(i => `<div class="history-item">${i}</div>`).join('');
        document.getElementById('historyScreen').style.display = 'flex';
    };
    document.getElementById('backBtn').onclick = () => document.getElementById('historyScreen').style.display = 'none';
    document.getElementById('sensSlider').oninput = (e) => document.getElementById('sensVal').innerText = e.target.value;
    document.getElementById('coolSlider').oninput = (e) => document.getElementById('coolVal').innerText = e.target.value;
</script>
</body>
</html>
