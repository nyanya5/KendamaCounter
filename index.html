<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音で測る！もしかめカウンター🐾</title>
    <style>
        :root { --brown: #5D4037; --pink: #F06292; --bg: #FFFBF0; --green: #A5D6A7; --red: #FF8A80; }
        body { font-family: sans-serif; background: var(--bg); color: var(--brown); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; user-select: none; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 90%; max-width: 400px; text-align: center; }
        #timer { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        #count { font-size: 9rem; font-weight: 900; margin: 0; line-height: 1; color: var(--brown); }
        #pace { font-size: 1.2rem; font-weight: bold; color: var(--pink); height: 1.5rem; margin-bottom: 5px; }
        #paw { font-size: 4rem; transition: transform 0.1s; margin: 10px 0; }
        .meter-bg { width: 100%; height: 10px; background: #ddd; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #v-meter { width: 0%; height: 100%; background: var(--pink); transition: width 0.1s; }
        button { width: 100%; padding: 18px; font-size: 1.3rem; font-weight: bold; border: none; border-radius: 20px; cursor: pointer; margin-bottom: 10px; box-shadow: 0 4px #ccc; }
        #startBtn { background-color: var(--green); color: var(--brown); }
        #startBtn.stop { background-color: var(--red); color: white; }
        #saveBtn { background-color: var(--brown); color: white; }
        .sliders { width: 100%; background: white; padding: 12px; border-radius: 15px; box-sizing: border-box; margin-bottom: 10px; }
        .slider-group { margin-bottom: 5px; text-align: left; }
        label { font-size: 0.8rem; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: var(--pink); }
        #historyScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; padding: 20px; box-sizing: border-box; z-index: 100; flex-direction: column; }
        #historyList { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        .history-item { background: white; margin-bottom: 8px; padding: 12px; border-radius: 12px; text-align: left; font-size: 0.9rem; border-left: 5px solid var(--pink); }
    </style>
</head>
<body>

<div class="container" id="mainScreen">
    <div id="timer">00秒</div>
    <div id="pace"></div>
    <div id="count">0</div>
    <div id="paw">🐾</div>
    <label>音の反応レベル</label>
    <div class="meter-bg"><div id="v-meter"></div></div>
    <div class="controls">
        <button id="startBtn">開始</button>
        <button id="saveBtn" disabled>保存してリセット</button>
        <div class="sliders">
            <div class="slider-group">
                <label>マイク感度: <span id="sVal">15</span></label>
                <input type="range" id="sS" min="1" max="100" value="15">
            </div>
            <div class="slider-group">
                <label>反応間隔: <span id="cVal">350</span>ms</label>
                <input type="range" id="cS" min="200" max="600" value="350">
            </div>
        </div>
        <button id="historyBtn" style="background:none; text-decoration:underline; box-shadow:none; color:var(--brown);">履歴を表示</button>
    </div>
</div>

<div id="historyScreen">
    <h2>練習の記録 🐾</h2>
    <div id="historyList"></div>
    <button id="backBtn" style="background:var(--brown); color:white; border-radius:20px; padding:15px; width:100%; border:none;">戻る</button>
</div>

<script>
    let audioCtx, analyser, dataArray, stream, filter;
    let counting = false;
    let count = 0;
    let tapTimes = [];
    let startTime;
    let timerInt;
    let history = JSON.parse(localStorage.getItem('kendama_history') || '[]');

    const startBtn = document.getElementById('startBtn');
    const saveBtn = document.getElementById('saveBtn');
    const countDisp = document.getElementById('count');
    const timerDisp = document.getElementById('timer');
    const paceDisp = document.getElementById('pace');
    const paw = document.getElementById('paw');
    const vMeter = document.getElementById('v-meter');

    function playTone(freq, duration) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.2, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
        osc.start(); osc.stop(ctx.currentTime + duration);
    }

    async function monitorSound() {
        if (!counting) return;
        analyser.getByteFrequencyData(dataArray);
        
        let maxVolume = 0;
        for (let i = 0; i < dataArray.length; i++) {
            if (dataArray[i] > maxVolume) maxVolume = dataArray[i];
        }
        
        vMeter.style.width = Math.min(100, (maxVolume / 180 * 100)) + "%";

        const threshold = parseInt(document.getElementById('sS').value);
        const cooldown = parseInt(document.getElementById('cS').value);
        const now = Date.now();
        const lastTime = tapTimes.length > 0 ? tapTimes[tapTimes.length - 1] : 0;

        if (maxVolume > threshold && (now - lastTime) > cooldown && (now - startTime) > 800) {
            count++;
            countDisp.innerText = count;
            tapTimes.push(now);
            paw.style.transform = "scale(1.4)";
            setTimeout(() => paw.style.transform = "scale(1)", 80);
            updatePace(now);
        }
        requestAnimationFrame(monitorSound);
    }

    function updatePace(currentTime) {
        const elapsed = (currentTime - startTime) / 1000;
        if (elapsed > 1 && count > 1) {
            const paceValue = Math.round(((count - 1) / elapsed) * 60);
            paceDisp.innerText = `${paceValue} 回/分`;
        }
    }

    startBtn.onclick = async () => {
        if (!counting) {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                });
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                
                // 少し低い音も拾えるよう中心周波数を1600Hzに調整しました
                filter = audioCtx.createBiquadFilter();
                filter.type = "bandpass";
                filter.frequency.value = 1600; 
                filter.Q.value = 0.8; 
                
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 512;
                analyser.minDecibels = -85;
                
                source.connect(filter);
                filter.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                startBtn.disabled = true;
                for(let i=3; i>0; i--) {
                    startBtn.innerText = i;
                    playTone(440, 0.1);
                    await new Promise(r => setTimeout(r, 1000));
                }
                playTone(880, 0.5);
                
                counting = true;
                count = 0;
                tapTimes = [];
                startTime = Date.now();
                countDisp.innerText = "0";
                startBtn.innerText = "ストップ";
                startBtn.classList.add('stop');
                startBtn.disabled = false;
                saveBtn.disabled = true;

                monitorSound();
                timerInt = setInterval(() => {
                    timerDisp.innerText = Math.floor((Date.now() - startTime) / 1000).toString().padStart(2, '0') + "秒";
                }, 1000);
            } catch (err) {
                alert("マイクを許可してください");
            }
        } else {
            stopCounting();
        }
    };

    function stopCounting() {
        counting = false;
        clearInterval(timerInt);
        if (stream) stream.getTracks().forEach(t => t.stop());
        if (count > 0) { count--; tapTimes.pop(); }
        countDisp.innerText = count;
        startBtn.innerText = "開始";
        startBtn.classList.remove('stop');
        saveBtn.disabled = false;
    }

    saveBtn.onclick = () => {
        const date = new Date().toLocaleString('ja-JP', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
        const paceVal = paceDisp.innerText || "---";
        history.unshift({ date, count, duration: timerDisp.innerText, pace: paceVal });
        localStorage.setItem('kendama_history', JSON.stringify(history.slice(0, 50)));
        count = 0; countDisp.innerText = "0"; timerDisp.innerText = "00秒"; paceDisp.innerText = "";
        saveBtn.disabled = true;
    };

    document.getElementById('historyBtn').onclick = () => {
        document.getElementById('historyList').innerHTML = history.map(item => `
            <div class="history-item">
                <small>${item.date}</small><br>
                <strong>${item.count}回</strong> (${item.duration})<br>
                <span style="color:var(--pink)">${item.pace}</span>
            </div>
        `).join('');
        document.getElementById('historyScreen').style.display = 'flex';
    };
    document.getElementById('backBtn').onclick = () => document.getElementById('historyScreen').style.display = 'none';
    document.getElementById('sS').oninput = (e) => document.getElementById('sVal').innerText = e.target.value;
    document.getElementById('cS').oninput = (e) => document.getElementById('cVal').innerText = e.target.value;
</script>

</body>
</html>
