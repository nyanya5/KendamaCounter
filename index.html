<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音で測る！もしかめカウンター🐾</title>
    <style>
        :root { --brown: #5D4037; --pink: #F06292; --bg: #FFFBF0; --green: #A5D6A7; --red: #FF8A80; }
        body { font-family: sans-serif; background: var(--bg); color: var(--brown); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; user-select: none; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 90%; max-width: 400px; text-align: center; }
        #timer { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        #count { font-size: 9rem; font-weight: 900; margin: 0; line-height: 1; color: var(--brown); }
        #bpm { font-size: 1.2rem; font-weight: bold; color: var(--pink); height: 1.5rem; margin-bottom: 5px; }
        #paw { font-size: 4rem; transition: transform 0.1s; margin: 10px 0; }
        
        .meter-bg { width: 100%; height: 10px; background: #ddd; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #v-meter { width: 0%; height: 100%; background: var(--pink); transition: width 0.1s; }

        button { width: 100%; padding: 18px; font-size: 1.3rem; font-weight: bold; border: none; border-radius: 20px; cursor: pointer; margin-bottom: 10px; box-shadow: 0 4px #ccc; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #ccc; }
        #startBtn { background-color: var(--green); color: var(--brown); }
        #startBtn.stop { background-color: var(--red); color: white; }
        #saveBtn { background-color: var(--brown); color: white; }
        .sliders { width: 100%; background: white; padding: 12px; border-radius: 15px; box-sizing: border-box; margin-bottom: 10px; }
        .slider-group { margin-bottom: 5px; text-align: left; }
        label { font-size: 0.8rem; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: var(--pink); }
        
        #historyScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; padding: 20px; box-sizing: border-box; z-index: 100; flex-direction: column; }
        #historyList { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        .clear-btn { background-color: #eee; color: #999; font-size: 0.9rem; padding: 10px; box-shadow: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container" id="mainScreen">
    <div id="timer">00:00</div>
    <div id="bpm"></div>
    <div id="count">0</div>
    <div id="paw">🐾</div>
    
    <label>マイク入力レベル（高域抽出）</label>
    <div class="meter-bg"><div id="v-meter"></div></div>

    <div class="controls">
        <button id="startBtn">マイクを許可して開始</button>
        <button id="saveBtn" disabled>保存してリセット</button>
        <div class="sliders">
            <div class="slider-group">
                <label>マイク感度（音のしきい値）: <span id="sVal">50</span></label>
                <input type="range" id="sS" min="10" max="150" value="50">
            </div>
            <div class="slider-group">
                <label>誤検出防止（反応間隔）: <span id="cVal">400</span>ms</label>
                <input type="range" id="cS" min="50" max="800" value="400">
            </div>
        </div>
        <button id="historyBtn" style="background:none; text-decoration:underline; box-shadow:none; color:var(--brown);">履歴を表示</button>
    </div>
</div>

<div id="historyScreen">
    <h2>練習の記録 🐾</h2>
    <div id="historyList"></div>
    <button id="clearBtn" class="clear-btn">全ての履歴を消去</button>
    <button id="backBtn" style="background:var(--brown); color:white;">戻る</button>
</div>

<script>
    let audioCtx, analyser, dataArray, stream, biquadFilter;
    let counting = false;
    let count = 0;
    let tapTimes = [];
    let startTime;
    let timerInt;
    let history = JSON.parse(localStorage.getItem('kendama_history') || '[]');

    const startBtn = document.getElementById('startBtn');
    const saveBtn = document.getElementById('saveBtn');
    const countDisp = document.getElementById('count');
    const timerDisp = document.getElementById('timer');
    const bpmDisp = document.getElementById('bpm');
    const paw = document.getElementById('paw');
    const vMeter = document.getElementById('v-meter');
    const historyList = document.getElementById('historyList');

    function playTone(freq, duration) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.2, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
        osc.start(); osc.stop(ctx.currentTime + duration);
    }

    function monitorSound() {
        if (!counting) return;
        analyser.getByteFrequencyData(dataArray);
        
        let maxVolume = 0;
        for (let i = 0; i < dataArray.length; i++) {
            if (dataArray[i] > maxVolume) maxVolume = dataArray[i];
        }
        
        vMeter.style.width = (maxVolume / 255 * 100) + "%";

        const threshold = parseInt(document.getElementById('sS').value);
        const cooldown = parseInt(document.getElementById('cS').value);
        const now = Date.now();
        const lastTime = tapTimes.length > 0 ? tapTimes[tapTimes.length - 1] : 0;

        if (maxVolume > threshold && (now - lastTime) > cooldown && (now - startTime) > 1000) {
            count++;
            countDisp.innerText = count;
            tapTimes.push(now);
            
            paw.style.transform = "scale(1.5)";
            setTimeout(() => paw.style.transform = "scale(1)", 100);
            updateBPM(now);
        }
        requestAnimationFrame(monitorSound);
    }

    function updateBPM(currentTime) {
        const elapsed = (currentTime - startTime) / 1000;
        if (elapsed > 1 && count > 0) {
            const bpmValue = Math.round((count / elapsed) * 60);
            bpmDisp.innerText = `${bpmValue} BPM`;
        }
    }

    function formatTime(ms) {
        const s = Math.floor(ms / 1000);
        return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    }

    startBtn.onclick = async () => {
        if (!counting) {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { 
                        echoCancellation: false, 
                        noiseSuppression: false, 
                        autoGainControl: false 
                    } 
                });
                
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                
                // 【ノイズ対策】ハイパスフィルターを追加（低い音をカット）
                biquadFilter = audioCtx.createBiquadFilter();
                biquadFilter.type = "highpass";
                biquadFilter.frequency.value = 1000; // 1000Hz以下のノイズをカット
                
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                analyser.minDecibels = -70; // 小さすぎる背景ノイズを無視
                
                // 接続: マイク -> フィルター -> 解析器
                source.connect(biquadFilter);
                biquadFilter.connect(analyser);
                
                dataArray = new Uint8Array(analyser.frequencyBinCount);

                startBtn.disabled = true;
                for(let i=3; i>0; i--) {
                    startBtn.innerText = i;
                    playTone(440, 0.1);
                    await new Promise(r => setTimeout(r, 1000));
                }
                playTone(880, 0.5);
                startBtn.innerText = "GO!";

                counting = true;
                count = 0;
                tapTimes = [];
                startTime = Date.now();
                countDisp.innerText = "0";
                startBtn.innerText = "ストップ";
                startBtn.classList.add('stop');
                startBtn.disabled = false;
                saveBtn.disabled = true;

                monitorSound();
                timerInt = setInterval(() => {
                    timerDisp.innerText = formatTime(Date.now() - startTime);
                }, 1000);
            } catch (err) {
                alert("マイクの使用を許可してください。");
            }
        } else {
            counting = false;
            clearInterval(timerInt);
            if (stream) stream.getTracks().forEach(t => t.stop());

            if (count > 0) {
                count--;
                tapTimes.pop();
            }

            const lastSuccessTime = tapTimes.length > 0 ? tapTimes[tapTimes.length - 1] : startTime;
            const finalTimeMs = (count > 0) ? (lastSuccessTime - startTime) : 0;
            
            countDisp.innerText = count;
            timerDisp.innerText = formatTime(finalTimeMs);
            
            if (finalTimeMs > 1000 && count > 0) {
                const finalBpm = Math.round((count / (finalTimeMs / 1000)) * 60);
                bpmDisp.innerText = `${finalBpm} BPM`;
            } else {
                bpmDisp.innerText = "";
            }

            startBtn.innerText = "マイクを許可して開始";
            startBtn.classList.remove('stop');
            saveBtn.disabled = false;
        }
    };

    saveBtn.onclick = () => {
        const duration = timerDisp.innerText;
        const bpmValue = bpmDisp.innerText;
        const date = new Date().toLocaleString('ja-JP', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
        
        history.unshift({ date, count, duration, bpm: bpmValue });
        localStorage.setItem('kendama_history', JSON.stringify(history.slice(0, 50)));
        
        count = 0;
        countDisp.innerText = "0";
        timerDisp.innerText = "00:00";
        bpmDisp.innerText = "";
        saveBtn.disabled = true;
    };

    function renderHistory() {
        historyList.innerHTML = history.map(item => `<div style="background:white; margin-bottom:5px; padding:10px; border-radius:10px;">${item.date}: <strong>${item.count}回</strong> (${item.duration}) ${item.bpm}</div>`).join('');
    }

    document.getElementById('historyBtn').onclick = () => {
        renderHistory();
        document.getElementById('historyScreen').style.display = 'flex';
    };

    document.getElementById('clearBtn').onclick = () => {
        history = [];
        localStorage.removeItem('kendama_history');
        renderHistory();
    };

    document.getElementById('backBtn').onclick = () => document.getElementById('historyScreen').style.display = 'none';
    document.getElementById('sS').oninput = (e) => document.getElementById('sVal').innerText = e.target.value;
    document.getElementById('cS').oninput = (e) => document.getElementById('cVal').innerText = e.target.value;
</script>

</body>
</html>
