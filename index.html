<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>もしかめカウンター🐾</title>
    <style>
        :root { --brown: #5D4037; --pink: #F06292; --bg: #FFFBF0; --green: #A5D6A7; --red: #FF8A80; }
        body { font-family: sans-serif; background: var(--bg); color: var(--brown); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 90%; max-width: 400px; text-align: center; }
        #timer { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        #count { font-size: 9rem; font-weight: 900; margin: 0; line-height: 1; color: var(--brown); }
        #bpm { font-size: 1.2rem; font-weight: bold; color: var(--pink); height: 1.5rem; margin-bottom: 5px; }
        #paw { font-size: 4rem; transition: transform 0.1s; margin: 10px 0; }
        .controls { width: 100%; }
        button { width: 100%; padding: 18px; font-size: 1.3rem; font-weight: bold; border: none; border-radius: 20px; cursor: pointer; margin-bottom: 10px; box-shadow: 0 4px #ccc; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #ccc; }
        #startBtn { background-color: var(--green); color: var(--brown); }
        #startBtn.stop { background-color: var(--red); color: white; }
        #saveBtn { background-color: var(--brown); color: white; }
        #historyBtn { background:transparent; color:var(--brown); text-decoration:underline; border:none; box-shadow:none; }
        .sliders { width: 100%; background: white; padding: 12px; border-radius: 15px; box-sizing: border-box; margin-bottom: 10px; }
        .slider-group { margin-bottom: 5px; text-align: left; }
        .slider-group label { font-size: 0.8rem; font-weight: bold; }
        input[type="range"] { width: 100%; accent-color: var(--pink); }
        #historyScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; flex-direction: column; padding: 20px; box-sizing: border-box; z-index: 100; }
        .history-list { flex: 1; overflow-y: auto; margin: 20px 0; }
        .history-item { background: white; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container" id="mainScreen">
    <div id="timer">00:00</div>
    <div id="bpm"></div>
    <div id="count">0</div>
    <div id="paw">🐾</div>
    <div class="controls">
        <button id="startBtn">スタート準備</button>
        <button id="saveBtn" disabled>保存してリセット</button>
        <div class="sliders">
            <div class="slider-group"><label>感度（低いほど敏感）: <span id="sVal">15</span></label><input type="range" id="sS" min="5" max="50" value="15"></div>
            <div class="slider-group"><label>防止（連続音を防ぐ）: <span id="cVal">250</span>ms</label><input type="range" id="cS" min="50" max="800" value="250"></div>
        </div>
        <button id="historyBtn">履歴を表示</button>
    </div>
</div>

<div id="historyScreen">
    <h2>練習の記録 🐾</h2>
    <div class="history-list" id="historyList"></div>
    <button id="backBtn" style="background:var(--brown); color:white;">戻る</button>
</div>

<script>
    // --- 改良版：アプリ風サウンド ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playAppSound(isStart = false) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);

        if (isStart) {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } else {
            // 「カツッ」という厚みのある音
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.04);
            filter.type = 'lowpass';
            filter.frequency.value = 1500;
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.04);
        }
    }

    let counting = false;
    let count = 0;
    let startTime;
    let timerInt;
    let lastTime = 0;
    const history = JSON.parse(localStorage.getItem('kendama_history') || '[]');

    const startBtn = document.getElementById('startBtn');
    const saveBtn = document.getElementById('saveBtn');
    const countDisp = document.getElementById('count');
    const timerDisp = document.getElementById('timer');
    const bpmDisp = document.getElementById('bpm');
    const paw = document.getElementById('paw');

    // 加速度センサー：より確実に反応するよう調整
    function handleMotion(e) {
        if (!counting) return;
        
        // accelerationIncludingGravity（重力込み）を優先使用
        const acc = e.accelerationIncludingGravity || e.acceleration;
        if (!acc || acc.x === null) return;

        const total = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
        const threshold = parseFloat(document.getElementById('sS').value);
        const cooldown = parseInt(document.getElementById('cS').value);
        const now = Date.now();

        // 衝撃を検知
        if (total > threshold && (now - lastTime) > cooldown) {
            count++;
            countDisp.innerText = count;
            lastTime = now;
            playAppSound(false);
            
            // アニメーション
            paw.style.transform = "scale(1.8)";
            setTimeout(() => paw.style.transform = "scale(1)", 80);
            updateBPM();
        }
    }

    function updateBPM() {
        const elapsed = (Date.now() - startTime) / 1000;
        if (elapsed > 1) {
            const bpm = Math.round((count / elapsed) * 60);
            bpmDisp.innerText = `${bpm} BPM`;
        }
    }

    startBtn.onclick = async () => {
        if (!counting) {
            await audioCtx.resume();
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                const permission = await DeviceMotionEvent.requestPermission();
                if (permission !== 'granted') return alert('設定 > Safari > モーションと画面の向きのアクセスをONにしてください');
            }

            startBtn.disabled = true;
            for(let i=3; i>0; i--) {
                startBtn.innerText = i;
                playAppSound(true); 
                await new Promise(r => setTimeout(r, 1000));
            }
            playAppSound(false);

            counting = true;
            count = 0;
            startTime = Date.now();
            countDisp.innerText = "0";
            startBtn.disabled = false;
            startBtn.innerText = "ストップ";
            startBtn.classList.add('stop');
            saveBtn.disabled = true;
            
            window.addEventListener('devicemotion', handleMotion, true);
            timerInt = setInterval(() => {
                const s = Math.floor((Date.now() - startTime) / 1000);
                timerDisp.innerText = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
            }, 1000);
        } else {
            counting = false;
            clearInterval(timerInt);
            window.removeEventListener('devicemotion', handleMotion, true);
            startBtn.innerText = "スタート準備";
            startBtn.classList.remove('stop');
            saveBtn.disabled = false;
        }
    };

    saveBtn.onclick = () => {
        const duration = timerDisp.innerText;
        const bpm = bpmDisp.innerText;
        const date = new Date().toLocaleString('ja-JP', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
        history.unshift({ date, count, duration, bpm });
        localStorage.setItem('kendama_history', JSON.stringify(history.slice(0, 50)));
        count = 0; countDisp.innerText = "0"; timerDisp.innerText = "00:00"; bpmDisp.innerText = ""; saveBtn.disabled = true;
        alert("保存しました！");
    };

    document.getElementById('historyBtn').onclick = () => {
        const list = document.getElementById('historyList');
        list.innerHTML = history.map(item => `<div class="history-item"><strong>${item.date}</strong>: ${item.count}回 (${item.duration}) ${item.bpm}</div>`).join('');
        document.getElementById('historyScreen').style.display = 'flex';
    };
    document.getElementById('backBtn').onclick = () => document.getElementById('historyScreen').style.display = 'none';
    document.getElementById('sS').oninput = (e) => document.getElementById('sVal').innerText = e.target.value;
    document.getElementById('cS').oninput = (e) => document.getElementById('cVal').innerText = e.target.value;
</script>

</body>
</html>
